<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴史問題集 - 近代国家の歩みと国際社会</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5f0e8;
    --aged: #e8dfc8;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --red: #8b2020;
    --red-light: #c0392b;
    --teal: #1a5f6e;
    --teal-light: #2980a0;
    --correct: #2d6a4f;
    --correct-bg: #d8f3dc;
    --wrong: #7b2d2d;
    --wrong-bg: #fde8e8;
    --neutral-bg: #eef5f7;
    --shadow: rgba(26, 18, 8, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(26,95,110,0.08) 0%, transparent 50%);
  }

  /* ===== HEADER ===== */
  header {
    background: var(--ink);
    color: var(--parchment);
    padding: 0;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 60px,
      rgba(201,168,76,0.06) 60px,
      rgba(201,168,76,0.06) 61px
    );
  }

  .header-inner {
    position: relative;
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 24px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .header-seal {
    width: 64px;
    height: 64px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    color: var(--gold);
    flex-shrink: 0;
    position: relative;
  }

  .header-seal::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 50%;
  }

  .header-text h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.3;
  }

  .header-text p {
    font-size: 12px;
    color: rgba(245,240,232,0.6);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }

  .gold-line {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ===== PROGRESS BAR ===== */
  .progress-bar-wrap {
    background: rgba(201,168,76,0.15);
    height: 6px;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    width: 0%;
    transition: width 0.4s ease;
  }

  /* ===== MAIN LAYOUT ===== */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 16px 64px;
  }

  /* ===== SECTION SELECTOR ===== */
  #section-select {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
  }

  .section-btn {
    padding: 8px 16px;
    border: 1.5px solid var(--gold);
    background: transparent;
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    font-weight: 500;
  }

  .section-btn:hover, .section-btn.active {
    background: var(--gold);
    color: var(--ink);
  }

  /* ===== UNIT HEADER ===== */
  .unit-title {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .unit-badge {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--parchment);
    background: var(--teal);
    padding: 4px 10px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .unit-title h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(16px, 2.5vw, 20px);
    font-weight: 700;
    color: var(--ink);
  }

  /* ===== QUESTION CARD ===== */
  .question-card {
    background: white;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
    transition: box-shadow 0.2s;
  }

  .question-card.answered-correct {
    border-color: var(--correct);
  }

  .question-card.answered-wrong {
    border-color: var(--wrong);
  }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 18px 14px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    background: #fdfaf4;
  }

  .q-number {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    min-width: 28px;
    line-height: 1.4;
    flex-shrink: 0;
  }

  .q-text {
    font-size: 14px;
    line-height: 1.8;
    flex: 1;
  }

  .q-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .tag-fill { background: #dbeafe; color: #1e40af; }
  .tag-choice { background: #fce7f3; color: #9d174d; }
  .tag-text { background: #dcfce7; color: #15803d; }

  /* ===== ANSWER AREA ===== */
  .q-body {
    padding: 14px 18px 16px;
  }

  /* Multiple choice */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .choice-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    background: white;
    border-radius: 3px;
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13.5px;
    transition: all 0.18s;
    color: var(--ink);
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--teal-light);
    background: var(--neutral-bg);
  }

  .choice-btn .circle {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid #9ca3af;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .choice-btn.selected .circle {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }

  .choice-btn.correct-ans {
    border-color: var(--correct);
    background: var(--correct-bg);
  }

  .choice-btn.correct-ans .circle {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }

  .choice-btn.wrong-ans {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }

  .choice-btn.wrong-ans .circle {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
  }

  .choice-btn:disabled {
    cursor: default;
  }

  /* Fill in the blank */
  .fill-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .fill-input {
    border: none;
    border-bottom: 2px solid var(--teal);
    padding: 4px 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    background: transparent;
    color: var(--ink);
    width: 120px;
    outline: none;
    transition: border-color 0.2s;
  }

  .fill-input:focus {
    border-bottom-color: var(--gold);
  }

  .fill-input.correct-input {
    border-bottom-color: var(--correct);
    color: var(--correct);
    font-weight: 700;
  }

  .fill-input.wrong-input {
    border-bottom-color: var(--wrong);
    color: var(--wrong);
  }

  /* Short answer */
  .short-textarea {
    width: 100%;
    border: 1.5px solid #d1d5db;
    border-radius: 3px;
    padding: 10px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    resize: vertical;
    min-height: 72px;
    outline: none;
    transition: border-color 0.2s;
  }

  .short-textarea:focus {
    border-color: var(--teal-light);
  }

  /* Answer reveal */
  .answer-reveal {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 13px;
    display: none;
    animation: slideIn 0.25s ease;
  }

  .answer-reveal.show { display: block; }

  .answer-reveal.correct-reveal {
    background: var(--correct-bg);
    border-left: 3px solid var(--correct);
    color: var(--correct);
  }

  .answer-reveal.wrong-reveal {
    background: var(--wrong-bg);
    border-left: 3px solid var(--wrong);
  }

  .answer-reveal strong {
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Submit row */
  .submit-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
  }

  .submit-btn {
    padding: 8px 20px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .submit-btn:hover:not(:disabled) {
    background: var(--teal-light);
  }

  .submit-btn:disabled {
    background: #9ca3af;
    cursor: default;
  }

  /* Status icon */
  .status-icon {
    font-size: 20px;
    display: none;
  }

  .status-icon.show { display: inline; }

  /* ===== BOTTOM CONTROLS ===== */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid rgba(201,168,76,0.3);
    flex-wrap: wrap;
    gap: 12px;
  }

  .counter-text {
    font-size: 13px;
    color: #6b7280;
  }

  .counter-text strong {
    color: var(--ink);
    font-weight: 700;
  }

  .finish-btn {
    padding: 12px 32px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }

  .finish-btn:hover {
    background: var(--red-light);
  }

  /* ===== RESULTS SCREEN ===== */
  #results {
    display: none;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .results-hero {
    text-align: center;
    padding: 40px 20px 32px;
    background: white;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    box-shadow: 0 4px 24px var(--shadow);
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .results-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--teal), var(--gold), var(--red));
  }

  .score-circle {
    width: 120px;
    height: 120px;
    margin: 0 auto 20px;
    position: relative;
  }

  .score-circle svg {
    transform: rotate(-90deg);
  }

  .score-circle .track {
    fill: none;
    stroke: #e5e7eb;
    stroke-width: 8;
  }

  .score-circle .fill {
    fill: none;
    stroke: var(--gold);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 314;
    stroke-dashoffset: 314;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-pct {
    font-family: 'Noto Serif JP', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .score-label {
    font-size: 11px;
    color: #6b7280;
    margin-top: 2px;
  }

  .results-hero h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    margin-bottom: 8px;
  }

  .results-stats {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'Noto Serif JP', serif;
    font-size: 26px;
    font-weight: 700;
  }

  .stat-num.correct-num { color: var(--correct); }
  .stat-num.wrong-num { color: var(--wrong); }
  .stat-num.skip-num { color: #9ca3af; }

  .stat-lbl {
    font-size: 12px;
    color: #6b7280;
    margin-top: 2px;
  }

  /* Result sections */
  .result-section {
    margin-bottom: 24px;
  }

  .result-section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid currentColor;
  }

  .result-section-title.wrong-title { color: var(--wrong); }
  .result-section-title.review-title { color: var(--teal); }

  .result-section-title h3 {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
  }

  .result-section-title .icon { font-size: 20px; }

  /* Result item */
  .result-item {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 4px solid;
  }

  .result-item.wrong-item { border-left-color: var(--wrong); }
  .result-item.review-item { border-left-color: var(--teal); }

  .result-item-q {
    font-size: 13.5px;
    line-height: 1.7;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .result-answer-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12.5px;
  }

  .your-ans {
    color: var(--wrong);
  }

  .correct-ans-label {
    color: var(--correct);
    font-weight: 700;
  }

  .review-advice {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    color: var(--teal);
    background: var(--neutral-bg);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* Retry button */
  .retry-wrap {
    text-align: center;
    margin-top: 32px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .retry-btn {
    padding: 12px 28px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .retry-btn:hover { background: var(--teal-light); }

  .retry-wrong-btn {
    padding: 12px 28px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .retry-wrong-btn:hover { background: var(--red-light); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: #9ca3af;
    font-size: 14px;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .q-header { padding: 12px 14px 10px; }
    .q-body { padding: 12px 14px 14px; }
    .q-text { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-seal">史</div>
    <div class="header-text">
      <h1>歴史問題集<br><small style="font-size:0.6em;font-weight:400;letter-spacing:0.15em;">近代国家の歩みと国際社会</small></h1>
      <p>--2年問題集--</p>
    </div>
  </div>
  <div class="gold-line"></div>
  <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
</header>

<div class="container">

  <!-- SECTION BUTTONS -->
  <div id="section-select">
    <button class="section-btn active" onclick="showSection('all')">すべて</button>
    <button class="section-btn" onclick="showSection(0)">① 明治政府の近代化</button>
    <button class="section-btn" onclick="showSection(1)">② 新たな外交・沖縄と北海道</button>
    <button class="section-btn" onclick="showSection(2)">③ 自由民権運動・立憲政治</button>
    <button class="section-btn" onclick="showSection(3)">④ 帝国主義・日清戦争</button>
    <button class="section-btn" onclick="showSection(4)">⑤ 日露戦争・朝鮮と中国</button>
    <button class="section-btn" onclick="showSection(5)">⑥ 産業革命・近代文化</button>
    <button class="section-btn" onclick="showSection(6)">⑦ 第一次世界大戦・民族独立</button>
    <button class="section-btn" onclick="showSection(7)">⑧ 大正デモクラシー</button>
    <button class="section-btn" onclick="showSection(8)">⑨ 世界恐慌・軍部台頭</button>
    <button class="section-btn" onclick="showSection(9)">⑩ 第二次世界大戦</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div id="questions-container"></div>

    <div class="controls">
      <div class="counter-text">
        回答済み: <strong><span id="answered-count">0</span></strong> / <strong><span id="total-count">0</span></strong>問
      </div>
      <button class="finish-btn" onclick="showResults()">採点する ▶</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results">
    <div class="results-hero">
      <div class="score-circle">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle class="track" cx="60" cy="60" r="50"/>
          <circle class="fill" id="score-arc" cx="60" cy="60" r="50"/>
        </svg>
        <div class="score-center">
          <div class="score-pct" id="score-pct">0%</div>
          <div class="score-label">正答率</div>
        </div>
      </div>
      <h2 id="result-message">結果</h2>
      <div class="results-stats">
        <div class="stat-item">
          <div class="stat-num correct-num" id="stat-correct">0</div>
          <div class="stat-lbl">正解</div>
        </div>
        <div class="stat-item">
          <div class="stat-num wrong-num" id="stat-wrong">0</div>
          <div class="stat-lbl">不正解</div>
        </div>
        <div class="stat-item">
          <div class="stat-num skip-num" id="stat-skip">0</div>
          <div class="stat-lbl">未回答</div>
        </div>
      </div>
    </div>

    <!-- Wrong answers -->
    <div class="result-section" id="wrong-section">
      <div class="result-section-title wrong-title">
        <span class="icon">✗</span>
        <h3>間違えた問題</h3>
      </div>
      <div id="wrong-list"></div>
    </div>

    <!-- Review advice -->
    <div class="result-section" id="review-section">
      <div class="result-section-title review-title">
        <span class="icon">📖</span>
        <h3>もう一度復習しよう</h3>
      </div>
      <div id="review-list"></div>
    </div>

    <div class="retry-wrap">
      <button class="retry-btn" onclick="retryAll()">もう一度すべて解く</button>
      <button class="retry-wrong-btn" onclick="retryWrong()">間違えた問題だけ解く</button>
    </div>
  </div>

</div>

<script>
// ===========================
// QUESTION DATA
// ===========================
const sections = [
  {
    title: "明治政府による「近代化」の始まり",
    unit: "第4章 近代国家 ①",
    questions: [
      { id: 'q1_1', type: 'fill', text: '明治政府が1868年に出した、政治の方針を示す文書を何といいますか。', answer: '五箇条の御誓文', hint: '「五箇条の◯◯文」' },
      { id: 'q1_2', type: 'choice', text: '1869年に東京に定めた新しい首都はどこですか。', choices: ['京都', '大阪', '東京', '横浜'], answer: '東京' },

// ===========================
// STATE
// ===========================
let currentFilter = 'all';
let displayedQuestions = []; // [{sectionIdx, q}]
let userAnswers = {}; // id -> {value, correct}
let wrongIds = new Set();
let retryMode = false;
let retryIds = [];

// ===========================
// RENDER
// ===========================
function getDisplayedQuestions() {
  let result = [];
  if (retryMode) {
    for (const s of sections) {
      for (const q of s.questions) {
        if (retryIds.includes(q.id)) result.push(q);
      }
    }
  } else if (currentFilter === 'all') {
    for (const s of sections) {
      for (const q of s.questions) result.push(q);
    }
  } else {
    const s = sections[currentFilter];
    if (s) for (const q of s.questions) result.push(q);
  }
  return result;
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  userAnswers = {};
  wrongIds = new Set();

  const toShow = getDisplayedQuestions();
  displayedQuestions = toShow;

  // Group by section
  const groups = {};
  for (const q of toShow) {
    const sIdx = sections.findIndex(s => s.questions.some(sq => sq.id === q.id));
    if (!groups[sIdx]) groups[sIdx] = { section: sections[sIdx], qs: [] };
    groups[sIdx].qs.push(q);
  }

  let qNum = 0;

  for (const sIdx of Object.keys(groups)) {
    const { section, qs } = groups[sIdx];

    const unitDiv = document.createElement('div');
    unitDiv.style.marginBottom = '32px';

    const unitTitle = document.createElement('div');
    unitTitle.className = 'unit-title';
    unitTitle.innerHTML = `<span class="unit-badge">${section.unit}</span><h2>${section.title}</h2>`;
    unitDiv.appendChild(unitTitle);

    for (const q of qs) {
      qNum++;
      unitDiv.appendChild(buildCard(q, qNum));
    }
    container.appendChild(unitDiv);
  }

  updateCounter();
}

function buildCard(q, num) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + q.id;

  // Tag
  const tagMap = { fill: ['語句記入', 'tag-fill'], choice: ['選択問題', 'tag-choice'], short: ['記述問題', 'tag-text'] };
  const [tagTxt, tagCls] = tagMap[q.type] || ['問題', 'tag-fill'];

  card.innerHTML = `
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div class="q-text">${q.text}</div>
      <span class="q-tag ${tagCls}">${tagTxt}</span>
    </div>
    <div class="q-body" id="body-${q.id}"></div>
  `;

  const body = card.querySelector('#body-' + q.id);

  if (q.type === 'choice') {
    const wrap = document.createElement('div');
    wrap.className = 'choices';
    const letters = ['ア', 'イ', 'ウ', 'エ', 'オ'];
    q.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="circle">${letters[i]}</span><span>${c}</span>`;
      btn.onclick = () => selectChoice(q, c, btn, wrap, card);
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);

  } else if (q.type === 'fill') {
    const wrap = document.createElement('div');
    wrap.className = 'fill-wrap';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'fill-input';
    input.placeholder = q.hint || '答えを入力';
    input.id = 'input-' + q.id;
    input.onkeydown = (e) => { if (e.key === 'Enter') checkFill(q, input, card); };
    input.oninput = updateCounter;
    wrap.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'submit-btn';
    btn.textContent = '確認';
    btn.id = 'fillbtn-' + q.id;
    btn.onclick = () => checkFill(q, input, card);
    wrap.appendChild(btn);

    const reveal = document.createElement('div');
    reveal.className = 'answer-reveal';
    reveal.id = 'reveal-' + q.id;

    body.appendChild(wrap);
    body.appendChild(reveal);

  } else if (q.type === 'short') {
    const ta = document.createElement('textarea');
    ta.className = 'short-textarea';
    ta.placeholder = '答えを入力してください';
    ta.id = 'input-' + q.id;
    ta.oninput = updateCounter;
    body.appendChild(ta);

    const row = document.createElement('div');
    row.className = 'submit-row';
    const btn = document.createElement('button');
    btn.className = 'submit-btn';
    btn.textContent = '答え合わせ';
    btn.onclick = () => checkShort(q, ta, card);
    row.appendChild(btn);
    body.appendChild(row);

    const reveal = document.createElement('div');
    reveal.className = 'answer-reveal';
    reveal.id = 'reveal-' + q.id;
    body.appendChild(reveal);
  }

  return card;
}

function selectChoice(q, chosen, btn, wrap, card) {
  if (userAnswers[q.id]) return; // already answered
  const correct = chosen === q.answer;
  userAnswers[q.id] = { value: chosen, correct };

  const letters = ['ア', 'イ', 'ウ', 'エ', 'オ'];
  wrap.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.disabled = true;
    const txt = q.choices[i];
    if (txt === q.answer) {
      b.classList.add('correct-ans');
    }
    if (b === btn && !correct) {
      b.classList.add('wrong-ans');
    }
  });

  card.classList.add(correct ? 'answered-correct' : 'answered-wrong');
  if (!correct) wrongIds.add(q.id);

  updateCounter();
  updateProgress();
}

function checkFill(q, input, card) {
  const val = input.value.trim();
  if (!val) return;
  if (userAnswers[q.id]) return;

  const correct = val === q.answer || isAcceptable(q, val);
  userAnswers[q.id] = { value: val, correct };

  input.disabled = true;
  input.classList.add(correct ? 'correct-input' : 'wrong-input');

  const reveal = document.getElementById('reveal-' + q.id);
  const btn = document.getElementById('fillbtn-' + q.id);
  if (btn) btn.disabled = true;

  reveal.className = 'answer-reveal show ' + (correct ? 'correct-reveal' : 'wrong-reveal');
  if (correct) {
    reveal.innerHTML = '<strong>✓ 正解！</strong>' + q.answer;
  } else {
    reveal.innerHTML = `<strong>✗ 不正解</strong>正しい答え：<b>${q.answer}</b>`;
    wrongIds.add(q.id);
  }

  card.classList.add(correct ? 'answered-correct' : 'answered-wrong');
  updateCounter();
  updateProgress();
}

function checkShort(q, ta, card) {
  const val = ta.value.trim();
  if (!val) return;
  if (userAnswers[q.id]) return;

  userAnswers[q.id] = { value: val, correct: null }; // manual check

  ta.disabled = true;
  const reveal = document.getElementById('reveal-' + q.id);
  reveal.className = 'answer-reveal show';
  reveal.style.background = '#f0f4f8';
  reveal.style.borderLeft = '3px solid #6b7280';
  reveal.innerHTML = `<strong>模範解答</strong>${q.answer}`;

  updateCounter();
  updateProgress();
}

function isAcceptable(q, val) {
  // Accept partial matches for some fill-in answers
  if (!q.acceptAlt) return false;
  return q.acceptAlt.includes(val);
}

// ===========================
// COUNTER & PROGRESS
// ===========================
function updateCounter() {
  const total = displayedQuestions.length;
  const answered = Object.keys(userAnswers).length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('total-count').textContent = total;
}

function updateProgress() {
  const total = displayedQuestions.length;
  const answered = Object.keys(userAnswers).length;
  const pct = total ? (answered / total) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ===========================
// SECTION FILTER
// ===========================
function showSection(idx) {
  currentFilter = idx;
  retryMode = false;
  document.querySelectorAll('.section-btn').forEach((b, i) => {
    if (idx === 'all') b.classList.toggle('active', i === 0);
    else b.classList.toggle('active', b.textContent.startsWith('①②③④⑤⑥⑦⑧⑨⑩'[idx] || '') || (i === idx + 1));
  });
  // Simpler: just mark by index
  document.querySelectorAll('.section-btn').forEach((b, i) => {
    if (idx === 'all') b.classList.toggle('active', i === 0);
    else b.classList.toggle('active', i === idx + 1);
  });
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  renderQuestions();
}

// ===========================
// RESULTS
// ===========================
function showResults() {
  // Force unanswered fills to be counted
  const total = displayedQuestions.length;
  let correct = 0, wrong = 0, skip = 0;

  for (const q of displayedQuestions) {
    const ans = userAnswers[q.id];
    if (!ans) { skip++; wrongIds.add(q.id); }
    else if (ans.correct === true) correct++;
    else if (ans.correct === false) wrong++;
    else skip++; // short answer
  }

  const pct = total ? Math.round((correct / total) * 100) : 0;

  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  // Animate score circle
  const arc = document.getElementById('score-arc');
  const circumference = 314;
  setTimeout(() => {
    arc.style.strokeDashoffset = circumference - (pct / 100) * circumference;
    if (pct >= 80) arc.style.stroke = '#2d6a4f';
    else if (pct >= 60) arc.style.stroke = '#c9a84c';
    else arc.style.stroke = '#8b2020';
  }, 100);

  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong + skip;
  document.getElementById('stat-skip').textContent = skip;

  let msg = '';
  if (pct === 100) msg = '完璧です！全問正解！🎉';
  else if (pct >= 80) msg = 'とても良くできました！';
  else if (pct >= 60) msg = '合格ライン！もう少し頑張りましょう。';
  else msg = 'もっと復習が必要です。頑張って！';
  document.getElementById('result-message').textContent = msg;

  // Wrong list
  const wrongList = document.getElementById('wrong-list');
  wrongList.innerHTML = '';
  const wrongSection = document.getElementById('wrong-section');

  if (wrongIds.size === 0) {
    wrongSection.style.display = 'none';
  } else {
    wrongSection.style.display = 'block';
    wrongIds.forEach(id => {
      const q = findQuestion(id);
      if (!q) return;
      const ans = userAnswers[id];
      const item = document.createElement('div');
      item.className = 'result-item wrong-item';
      const yourAns = ans ? ans.value : '（未回答）';
      item.innerHTML = `
        <div class="result-item-q">❌ ${q.text}</div>
        <div class="result-answer-row">
          <span class="your-ans">あなたの答え: ${yourAns}</span>
          <span class="correct-ans-label">正解: ${q.answer}</span>
        </div>
      `;
      wrongList.appendChild(item);
    });
  }

  // Review advice
  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';

  const reviewMap = {
    'q1_': { text: '明治政府の改革（富国強兵・文明開化）', page: 'p.170〜175' },
    'q2_': { text: '新たな外交と国境の画定（沖縄・北海道）', page: 'p.178〜181' },
    'q3_': { text: '自由民権運動と帝国憲法', page: 'p.184〜187' },
    'q4_': { text: '帝国主義・列強の海外進出と条約改正・日清戦争', page: 'p.190〜193' },
    'q5_': { text: '日露戦争・朝鮮と中国', page: 'p.194〜197' },
    'q6_': { text: '産業革命の進展と社会問題・近代文化', page: 'p.198〜207' },
    'q7_': { text: '第一次世界大戦と民族独立の動き', page: 'p.210〜217' },
    'q8_': { text: '大正デモクラシーと普通選挙', page: 'p.220〜227' },
    'q9_': { text: '世界恐慌・軍部の台頭・日中戦争', page: 'p.232〜239' },
    'q10_': { text: '第二次世界大戦と太平洋戦争', page: 'p.244〜253' },
  };

  const needsReview = new Set();
  wrongIds.forEach(id => {
    for (const prefix of Object.keys(reviewMap)) {
      if (id.startsWith(prefix)) needsReview.add(prefix);
    }
  });

  if (needsReview.size === 0) {
    reviewList.innerHTML = '<p style="color:#2d6a4f;font-size:14px;">✨ 特に復習が必要な単元はありません！</p>';
  } else {
    needsReview.forEach(prefix => {
      const info = reviewMap[prefix];
      const item = document.createElement('div');
      item.className = 'result-item review-item';
      item.innerHTML = `
        <div class="result-item-q">📚 <strong>${info.text}</strong></div>
        <span class="review-advice">教科書 ${info.page} を見直してみましょう</span>
      `;
      reviewList.appendChild(item);
    });
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function findQuestion(id) {
  for (const s of sections) {
    const q = s.questions.find(q => q.id === id);
    if (q) return q;
  }
  return null;
}

// ===========================
// RETRY
// ===========================
function retryAll() {
  retryMode = false;
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  wrongIds = new Set();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retryWrong() {
  if (wrongIds.size === 0) { alert('間違えた問題がありません！'); return; }
  retryMode = true;
  retryIds = [...wrongIds];
  wrongIds = new Set();
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===========================
// INIT
// ===========================
renderQuestions();
</script>
